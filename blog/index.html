<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog | Kylin</title>
  <meta name="description" content="Kylin 的博客文章列表。" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="icon" type="image/png" href="/assets/icons/github-avatar.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/site.css?v=20260630-1" />
</head>

<body>
  <header class="site-header">
    <nav class="navbar navbar-expand-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Kylin</a>
        <div class="navbar-nav flex-row gap-3 ms-auto">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link active" href="/blog/">Blog</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-main">
    <div class="container">
      <div class="page-heading">
        <p class="eyebrow">Writing</p>
        <h1>Blog</h1>
        <p>部分内容整理自博客园旧文，后续继续更新。</p>
      </div>
      <form id="blog-filters" class="blog-filters" role="search">
        <div class="blog-filter-grid">
          <label class="blog-filter-field" for="blog-search">
            <span>关键词</span>
            <input id="blog-search" type="search" placeholder="标题或摘要" autocomplete="off" />
          </label>
          <label class="blog-filter-field" for="blog-tag-input">
            <span>标签</span>
            <div id="blog-tag-combobox" class="blog-tag-combobox">
              <div id="blog-selected-tags" class="blog-selected-tags"></div>
              <input id="blog-tag-input" type="text" placeholder="输入或选择标签" autocomplete="off"
                aria-controls="blog-tag-suggestions" aria-expanded="false" />
            </div>
            <div id="blog-tag-suggestions" class="blog-tag-suggestions" role="listbox" hidden></div>
          </label>
          <div class="blog-filter-actions">
            <button class="button button-secondary" id="blog-clear" type="button">清除</button>
          </div>
        </div>
      </form>
      <p id="blog-result-summary" class="blog-result-summary" aria-live="polite"></p>
      <div id="blog-list" class="post-list" aria-live="polite"></div>
      <nav id="blog-pagination" class="blog-pagination" aria-label="博客分页"></nav>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container d-flex flex-wrap justify-content-between gap-2">
      <span>© 2026 Kylin</span>
      <span>Comments via GitHub Discussions / Giscus.</span>
    </div>
  </footer>

  <button class="back-to-top" type="button" aria-label="回到顶部" title="回到顶部">
    ↑
  </button>

  <script src="/assets/js/posts.js?v=20260630-1"></script>
  <script src="/assets/js/i18n.js?v=20260614-3"></script>
  <script src="/assets/js/blog.js?v=20260630-1"></script>
  <script src="/assets/js/back-to-top.js?v=20260613-2"></script>
</body>

</html>
