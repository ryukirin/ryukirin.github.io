<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Post | Kylin</title>
  <meta name="description" content="Kylin 的博客文章。" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://giscus.app" />
  <link rel="icon" type="image/png" href="/assets/icons/github-avatar.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/site.css?v=20260614-1" />
</head>

<body>
  <header class="site-header">
    <nav class="navbar navbar-expand-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Kylin</a>
        <div class="navbar-nav flex-row gap-3 ms-auto">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link active" href="/blog/">Blog</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-main">
    <div class="container article-layout">
      <aside class="article-toc" aria-label="文章目录">
        <div class="article-toc__inner">
          <p class="article-toc__title">目录</p>
          <nav id="post-toc"></nav>
        </div>
      </aside>

      <article class="article-shell">
        <a class="back-link" href="/blog/">← Back to Blog</a>
        <header class="article-header">
          <p id="post-date" class="eyebrow"></p>
          <h1 id="post-title">Loading...</h1>
          <div id="post-tags" class="tag-row"></div>
        </header>
        <div id="post-body" class="markdown-body" aria-live="polite"></div>

        <nav class="post-nav" aria-label="上一篇和下一篇">
          <a id="prev-post" class="post-nav__item" href="#">
            <span>上一篇</span>
            <strong></strong>
          </a>
          <a id="next-post" class="post-nav__item post-nav__item--next" href="#">
            <span>下一篇</span>
            <strong></strong>
          </a>
        </nav>

        <section class="comments-section" aria-labelledby="comments-title">
          <h2 id="comments-title">评论</h2>
          <p class="comments-section__note">
            使用 GitHub Discussions / Giscus。首次评论时需要登录 GitHub。
          </p>
          <div id="giscus-comments" class="giscus"></div>
        </section>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container d-flex flex-wrap justify-content-between gap-2">
      <span>© 2026 Kylin</span>
      <span>Markdown powered by plain static files.</span>
    </div>
  </footer>

  <button class="back-to-top" type="button" aria-label="回到顶部" title="回到顶部">
    ↑
  </button>

  <script src="/assets/js/posts.js?v=20260614-9"></script>
  <script src="/assets/js/i18n.js?v=20260614-3"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js"></script>
  <script src="/assets/js/markdown.js?v=20260613-4"></script>
  <script src="/assets/js/post.js?v=20260614-2"></script>
  <script src="/assets/js/giscus.js?v=20260614-1"></script>
  <script src="/assets/js/back-to-top.js?v=20260613-2"></script>
</body>

</html>
